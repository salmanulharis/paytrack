name: upi_expense_tracker
description: AI-powered UPI expense tracker — log expenses before payment, track in real time.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  mobile_scanner: ^7.0.1
  url_launcher: ^6.3.1
  android_intent_plus: ^5.3.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  crypto: ^3.0.6
  encrypt: ^5.0.3
  package_info_plus: ^8.3.0
  smooth_page_indicator: ^1.2.1
  percent_indicator: ^4.2.4
  table_calendar: ^3.2.0
  csv: ^6.0.0
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
